# Render Blueprint — deploy both services from one repo
services:
  # Backend API
  - type: web
    name: team-hub-api
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm install && npx tsc
    startCommand: node dist/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false  # Set to your Vercel frontend URL
      - key: PORT
        value: 5000
